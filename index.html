<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVERY PT CAREERS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #05070b;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
  overflow-x: hidden;
}

/* 히어로 */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 10%;
  background:
    radial-gradient(circle at 70% 30%, rgba(201,164,92,.25), transparent 30%),
    linear-gradient(135deg, #05070b, #111827);
}

/* 텍스트 */
.hero-text {
  position: absolute;
  left: 10%;
  max-width: 520px;
  z-index: 2;
}

.hero-text h1 {
  font-size: 52px;
  line-height: 1.3;
  font-weight: 900;
}

.hero-text h1 span {
  color: #c9a45c;
}

.hero-text p {
  margin-top: 20px;
  color: #ccc;
  line-height: 1.6;
}

/* 버튼 */
.btn-wrap {
  margin-top: 30px;
  display: flex;
  gap: 15px;
}

.btn {
  padding: 14px 24px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  transition: .3s;
}

.btn-primary {
  background: linear-gradient(135deg, #f2d27b, #c9a45c);
  color: #000;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(242,210,123,.3);
}

.btn-secondary {
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
}

.btn-secondary:hover {
  background: rgba(255,255,255,.05);
}

/* 로고 영역 */
.logo-stage {
  width: 420px;
  height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1200px;
}

.logo-box {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  animation: rotate360 18s linear infinite;
  transition: transform .1s;
}

.logo-box img {
  width: 100%;
  filter:
    drop-shadow(0 30px 40px rgba(0,0,0,.6))
    drop-shadow(0 0 20px rgba(201,164,92,.3));
}

/* 자동 회전 */
@keyframes rotate360 {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(360deg); }
}

/* 떠있는 느낌 */
.logo-box::before {
  content: "";
  position: absolute;
  inset: 20%;
  background: radial-gradient(circle, rgba(201,164,92,.4), transparent);
  filter: blur(30px);
  transform: translateZ(-80px);
}

/* 배경 빛 */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(242,210,123,.4), transparent);
  filter: blur(60px);
  animation: glowMove 6s infinite alternate;
}

@keyframes glowMove {
  from { transform: translate(-30px, -20px); }
  to { transform: translate(40px, 20px); }
}

/* 스크롤 애니메이션 */
.fade-up {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}

/* 반응형 */
@media(max-width:900px) {
  .hero-text {
    position: relative;
    left: 0;
    text-align: center;
    margin-bottom: 40px;
  }

  .hero {
    flex-direction: column;
    height: auto;
    padding: 120px 20px;
  }

  .logo-stage {
    width: 280px;
    height: 280px;
  }

  .hero-text h1 {
    font-size: 36px;
  }
}

</style>
</head>

<body>

<section class="hero">

  <div class="hero-text fade-up">
    <h1>
      수업을 잘하는<br>
      트레이너를 넘어,<br>
      <span>브랜드가 되는</span><br>
      트레이너로.
    </h1>

    <p>
      수업, 상담, 회원관리, 브랜딩까지 함께 설계하는
      트레이너 성장 시스템
    </p>

    <div class="btn-wrap">
      <a href="everypt-application.docx" class="btn btn-primary" download>지원서 다운로드</a>
      <a href="https://litt.ly/everypt" target="_blank" class="btn btn-secondary">브랜드 보기</a>
    </div>
  </div>

  <div class="logo-stage">
    <div class="glow"></div>

    <div class="logo-box" id="logoBox">
      <img src="logo.webp.png">
    </div>
  </div>

</section>

<script>

/* 마우스 반응 */
const logo = document.getElementById("logoBox");

document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 20;
  const y = (e.clientY / window.innerHeight - 0.5) * -20;

  logo.style.transform = `
    rotateY(${x}deg)
    rotateX(${y}deg)
  `;
});

/* 스크롤 애니메이션 */
const fadeEls = document.querySelectorAll(".fade-up");

window.addEventListener("scroll", () => {
  fadeEls.forEach(el => {
    const rect = el.getBoundingClientRect();
    if(rect.top < window.innerHeight - 100){
      el.classList.add("show");
    }
  });
});

</script>

</body>
</html>
